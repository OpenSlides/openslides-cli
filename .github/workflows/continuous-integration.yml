name: CI - Build and Test Service

on:
  push:
    branches:
      - main
  pull_request:
jobs:
  continuous-tests-go:
    name: Test go
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Go Format
        run: make format

      - name: Go Build
        run: go build ./...

      - name: Go Vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9

      - name: Test
        run: make test

      - name: Annotate tests
        if: always()
        uses: guyarb/golang-test-annotations@v0.9.0
        with:
          test-results: test.json
